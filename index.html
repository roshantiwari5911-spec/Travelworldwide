<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel World Wide — CRM Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Apple-style smooth transitions and premium glassmorphism */
        body {
            background-color: #0b0b0f;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
        /* Interactive Cursor Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <canvas id="bg-canvas"></canvas>

    <main class="w-full max-w-6xl glass-panel rounded-3xl p-8 md:p-12 shadow-2xl">
        
        <header class="flex justify-between items-center border-b border-white/10 pb-6 mb-8">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-white">Travel World Wide</h1>
                <p class="text-sm text-gray-400 mt-1">Boutique Itinerary & CRM Portal</p>
            </div>
            <div class="text-right text-xs text-gray-500">
                <p>salestravelworldwide@gmail.com</p>
                <p>+91 88926 89595</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="space-y-6">
                <h2 class="text-lg font-medium text-white/90">Create New Quotation</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Package Title</label>
                        <input type="text" id="pkg-title" placeholder="e.g., 4 Nights Luxury Escape to Maldives" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-white/30 text-white transition">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Destination</label>
                            <input type="text" id="pkg-destination" placeholder="Maldives" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-white/30 text-white transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Travel Date</label>
                            <input type="date" id="pkg-date" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-white/30 text-white transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Number of Guests</label>
                            <input type="number" id="pkg-pax" placeholder="2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-white/30 text-white transition">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Vehicle Standard</label>
                            <input type="text" id="pkg-vehicle" placeholder="Private Innova Crysta (AC)" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-white/30 text-white transition">
                        </div>
                    </div>
                </div>

                <div class="border-t border-white/10 pt-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-medium text-white/80">Day-Wise Itinerary</h3>
                        <button type="button" id="add-day-btn" class="text-xs bg-white text-black font-medium px-3 py-1.5 rounded-lg hover:bg-gray-200 transition pointer-events-auto">
                            + Add Next Day
                        </button>
                    </div>
                    
                    <div id="days-container" class="space-y-4"></div>
                </div>

                <div class="border-t border-white/10 pt-6 space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Total Package Price (INR)</label>
                        <input type="number" id="pkg-price" placeholder="₹1,50,000" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm font-semibold tracking-wide text-emerald-400 focus:outline-none focus:border-emerald-500/50 transition">
                    </div>

                    <div class="flex gap-4 pt-2">
                        <button id="save-btn" class="flex-1 bg-white/10 border border-white/20 text-white font-medium py-3 rounded-xl hover:bg-white/20 transition">
                            Save to CRM
                        </button>
                        <button id="export-btn" class="flex-1 bg-emerald-600 text-white font-medium py-3 rounded-xl hover:bg-emerald-500 shadow-lg shadow-emerald-900/20 transition">
                            Export Premium PDF
                        </button>
                    </div>
                </div>
            </section>

            <section class="lg:border-l lg:border-white/10 lg:pl-8 flex flex-col">
                <h2 class="text-lg font-medium text-white/90 mb-6">Live Premium Preview</h2>
                <div id="pdf-preview-pane" class="flex-1 bg-white text-slate-900 rounded-2xl p-8 min-h-[600px] shadow-inner text-sm space-y-6">
                    <p class="text-gray-400 italic text-center mt-24">Fill details on the left to watch your luxury proposal generate dynamically...</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x: undefined, y: undefined };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(mouse.x && mouse.y) {
                let gradient = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 450);
                gradient.addColorStop(0, 'rgba(99, 102, 241, 0.08)'); // Minimal elegant indigo
                gradient.addColorStop(0.5, 'rgba(168, 85, 247, 0.03)'); // Soft purple bleed
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
    <script src="app.js"></script>
</body>
</html>
